name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API base URL
        if: vars.API_BASE_URL
        run: |
          find public -name '*.html' -type f | while read file; do
            sed -i "s|window.API_BASE = ''|window.API_BASE = '${{ vars.API_BASE_URL }}'|g" "$file"
          done
          echo "Injected API_BASE_URL=${{ vars.API_BASE_URL }}"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
