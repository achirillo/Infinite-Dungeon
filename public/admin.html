<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Infinite Dungeon</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="admin-container">
    <div class="admin-header">
      <a href="/" class="btn small">&larr; Home</a>
      <h1>Database Admin</h1>
    </div>

    <div class="admin-section">
      <h2>Stats</h2>
      <div class="stats-grid" id="statsGrid">
        <div class="stat-item"><span class="stat-label">Scenes</span><span class="stat-value" id="statScenes">-</span></div>
        <div class="stat-item"><span class="stat-label">Options</span><span class="stat-value" id="statOptions">-</span></div>
        <div class="stat-item"><span class="stat-label">Max Depth</span><span class="stat-value" id="statDepth">-</span></div>
        <div class="stat-item"><span class="stat-label">DB Size</span><span class="stat-value" id="statSize">-</span></div>
      </div>
    </div>

    <div class="admin-section">
      <h2>Actions</h2>
      <div class="admin-actions">
        <button class="admin-btn" id="btnBackup">Create Backup</button>
        <button class="admin-btn danger" id="btnReset">Reset Database</button>
      </div>
    </div>

    <div class="admin-section">
      <h2>Backups</h2>
      <div class="backup-list" id="backupList">
        <span class="text-dim">Loading...</span>
      </div>
    </div>

    <div class="admin-feedback hidden" id="feedback"></div>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
