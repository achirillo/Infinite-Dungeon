services:
  - type: web
    name: infinite-dungeon
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAMES
        sync: false
      - key: DATABASE_PATH
        value: /var/data/dungeon.db
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
